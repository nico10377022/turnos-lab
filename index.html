<!DOCTYPE html>
<html>
<head>
    <title>Turnos Laboratorio</title>
</head>
<body>

<!-- ========================= -->
<!-- TURNOS DE HOY -->
<!-- ========================= -->
<h2>Turnos de hoy</h2>
<div id="hoy" style="border:2px solid red; padding:10px; margin-bottom:20px;">
    Cargando...
</div>

<!-- ========================= -->
<!-- TURNOS DE MAÑANA -->
<!-- ========================= -->
<h2>Turnos de mañana</h2>
<div id="manana" style="border:2px solid orange; padding:10px; margin-bottom:20px;">
    Cargando...
</div>

<!-- ========================= -->
<!-- RESERVAR -->
<!-- ========================= -->
<h2>Reservar turno</h2>

<label>Equipo:</label>
<select id="equipo">
    <option value="1">GC-FID</option>
    <option value="2">FAAS</option>
    <option value="3">Liofilizador</option>
</select>

<br><br>

<label>Inicio:</label>
<input type="datetime-local" id="inicio">

<br><br>

<label>Fin:</label>
<input type="datetime-local" id="fin">

<br><br>

<label>Usuario:</label>
<input type="text" id="usuario">

<br><br>

<button onclick="crearTurno()">Reservar</button>

<p id="resultado"></p>

<hr>

<!-- ========================= -->
<!-- VER TURNOS -->
<!-- ========================= -->
<h2>Ver turnos</h2>

<label>Equipo:</label>
<select id="equipo_ver" onchange="verTurnos()">
    <option value="1">GC-FID</option>
    <option value="2">FAAS</option>
    <option value="3">Liofilizador</option>
</select>

<ul id="lista"></ul>

<script>

// API (misma URL)
const API = "";

// nombres de equipos
const nombres = {
    1: "GC-FID",
    2: "FAAS",
    3: "Liofilizador"
};

// =========================
// CREAR TURNO
// =========================
async function crearTurno() {
    const equipo_id = document.getElementById("equipo").value;
    const inicio = document.getElementById("inicio").value + ":00";
    const fin = document.getElementById("fin").value + ":00";
    const usuario = document.getElementById("usuario").value;

    if (!inicio || !fin || !usuario) {
        alert("Completar todos los campos");
        return;
    }

    try {
        const res = await fetch(`${API}/turno?equipo_id=${equipo_id}&inicio=${inicio}&fin=${fin}&usuario=${usuario}`, {
            method: "POST"
        });

        const data = await res.json();
        document.getElementById("resultado").innerText = JSON.stringify(data);

        document.getElementById("inicio").value = "";
        document.getElementById("fin").value = "";
        document.getElementById("usuario").value = "";

        verTurnos();
        verTurnosHoy();
        verTurnosManana();

    } catch (error) {
        document.getElementById("resultado").innerText = "Error conexión";
    }
}

// =========================
// VER TURNOS
// =========================
async function verTurnos() {
    const equipo_id = document.getElementById("equipo_ver").value;

    try {
        const res = await fetch(`${API}/turnos/${equipo_id}`);
        const data = await res.json();

        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        data.forEach(t => {

            const inicio = new Date(t.inicio).toLocaleString();
            const fin = new Date(t.fin).toLocaleString();

            const li = document.createElement("li");

            li.innerHTML = `
                [${nombres[equipo_id]}] ${inicio} → ${fin} (${t.usuario})
                <button onclick="eliminarTurno(${t.id})">❌</button>
            `;

            lista.appendChild(li);
        });

    } catch (error) {
        console.error(error);
    }
}

// =========================
// ELIMINAR TURNO
// =========================
async function eliminarTurno(id) {
    if (!confirm("¿Eliminar turno?")) return;

    await fetch(`${API}/turno/${id}`, {
        method: "DELETE"
    });

    verTurnos();
    verTurnosHoy();
    verTurnosManana();
}

// =========================
// FUNCIONES DE FECHA
// =========================
function esHoy(fechaStr) {
    const fecha = new Date(fechaStr);
    const hoy = new Date();

    return (
        fecha.getFullYear() === hoy.getFullYear() &&
        fecha.getMonth() === hoy.getMonth() &&
        fecha.getDate() === hoy.getDate()
    );
}

function esManana(fechaStr) {
    const fecha = new Date(fechaStr);
    const manana = new Date();
    manana.setDate(manana.getDate() + 1);

    return (
        fecha.getFullYear() === manana.getFullYear() &&
        fecha.getMonth() === manana.getMonth() &&
        fecha.getDate() === manana.getDate()
    );
}

// =========================
// TURNOS DE HOY
// =========================
async function verTurnosHoy() {
    let todos = [];

    for (let i = 1; i <= 3; i++) {
        const res = await fetch(`${API}/turnos/${i}`);
        const data = await res.json();

        data.forEach(t => {
            t.equipo_nombre = nombres[i];
        });

        todos = todos.concat(data);
    }

    const hoyDiv = document.getElementById("hoy");
    const hoyTurnos = todos.filter(t => esHoy(t.inicio));

    if (hoyTurnos.length === 0) {
        hoyDiv.innerHTML = "✔ No hay turnos hoy";
        hoyDiv.style.borderColor = "green";
        return;
    }

    hoyDiv.style.borderColor = "red";
    hoyDiv.innerHTML = "<b>⚠ Turnos hoy:</b><br>";

    hoyTurnos.forEach(t => {

        const inicio = new Date(t.inicio).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const fin = new Date(t.fin).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        hoyDiv.innerHTML += `<b>${t.equipo_nombre}</b> → ${inicio} - ${fin} (${t.usuario})<br>`;
    });
}

// =========================
// TURNOS DE MAÑANA
// =========================
async function verTurnosManana() {
    let todos = [];

    for (let i = 1; i <= 3; i++) {
        const res = await fetch(`${API}/turnos/${i}`);
        const data = await res.json();

        data.forEach(t => {
            t.equipo_nombre = nombres[i];
        });

        todos = todos.concat(data);
    }

    const mananaDiv = document.getElementById("manana");
    const mananaTurnos = todos.filter(t => esManana(t.inicio));

    if (mananaTurnos.length === 0) {
        mananaDiv.innerHTML = "✔ No hay turnos mañana";
        mananaDiv.style.borderColor = "green";
        return;
    }

    mananaDiv.style.borderColor = "orange";
    mananaDiv.innerHTML = "<b>📅 Turnos mañana:</b><br>";

    mananaTurnos.forEach(t => {

        const inicio = new Date(t.inicio).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const fin = new Date(t.fin).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        mananaDiv.innerHTML += `<b>${t.equipo_nombre}</b> → ${inicio} - ${fin} (${t.usuario})<br>`;
    });
}

// =========================
// AUTO REFRESH
// =========================
setInterval(verTurnos, 5000);
setInterval(verTurnosHoy, 60000);
setInterval(verTurnosManana, 60000);

// cargar al inicio
verTurnos();
verTurnosHoy();
verTurnosManana();

</script>

</body>
</html>
